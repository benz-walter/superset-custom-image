name: workflow.yml
on: [push]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/superset

jobs:
  build-latest:
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == github.event.repository.default_branch }}
    outputs:
      image_tag: ${{ steps.image-tag.outputs.image_tag }}
    steps:
      - id: image-tag
        run: echo "image_tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Build image
        uses: ./.github/composites/build
        with:
          image_tag: ${{ steps.image-tag.outputs.image_tag }}
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.github_token }}

  release:
    runs-on: ubuntu-latest
    if: ${{ github.ref_type == 'tag' }}
    outputs:
      image_tag: ${{ steps.image-tag.outputs.image_tag }}
    steps:
      - id: image-tag
        run: echo "image_tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}" >> $GITHUB_OUTPUT
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Build image
        uses: ./.github/composites/build
        with:
          image_tag: ${{ steps.image-tag.outputs.image_tag }}
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.github_token }}
